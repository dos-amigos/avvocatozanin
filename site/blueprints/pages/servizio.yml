title: Servizio

tabs:
  hero:
    label: Hero
    icon: image
    fields:
      hero_title:
        label: Titolo Hero
        type: text
        required: true
      hero_subtitle:
        label: Sottotitolo Hero
        type: textarea
        size: small
      hero_image_url:
        label: URL Immagine Hero
        type: url
        help: "URL Unsplash dell'immagine hero (es. https://images.unsplash.com/...?w=1920&q=80)"

  contenuto:
    label: Contenuto
    icon: text
    fields:
      panoramica_body:
        label: Panoramica - Testo
        type: textarea
        help: Testo della sezione panoramica (supporta Markdown)
      includes:
        label: Cosa Include
        type: structure
        help: "Le voci del servizio (4-6 consigliate)"
        fields:
          icon:
            label: Icona
            type: text
            width: 1/4
            placeholder: file-text
            help: "Nome icona da lucide.dev"
          title:
            label: Titolo
            type: text
            width: 3/4
            required: true
          description:
            label: Descrizione
            type: textarea
            size: small
      process_steps:
        label: Il Processo
        type: structure
        help: "Le fasi del processo legale (4-5 consigliate)"
        fields:
          step:
            label: Numero Step
            type: text
            width: 1/4
            placeholder: "01"
          title:
            label: Titolo
            type: text
            width: 3/4
            required: true
          description:
            label: Descrizione
            type: textarea
            size: small
      faq:
        label: FAQ
        type: structure
        help: "Domande frequenti (4-6 consigliate)"
        fields:
          question:
            label: Domanda
            type: text
            required: true
          answer:
            label: Risposta
            type: textarea
            size: small

  card:
    label: Card
    icon: grid
    fields:
      icon:
        label: Icona Card
        type: text
        help: "Nome icona Lucide per la card nella pagina servizi"
        placeholder: users
      card_title:
        label: Titolo Card
        type: text
        help: "Titolo per la card nella pagina listing"
      card_description:
        label: Descrizione Card
        type: textarea
        size: small

  cta:
    label: CTA
    icon: bolt
    fields:
      cta_title:
        label: Titolo CTA
        type: text
        placeholder: Hai bisogno di assistenza?
      cta_description:
        label: Descrizione CTA
        type: textarea
        size: small
      cta_button_text:
        label: Testo Pulsante
        type: text
        placeholder: Contattaci
      cta_button_url:
        label: URL Pulsante
        type: text
        help: "Slug della pagina (es. contatti)"

  seo:
    label: SEO
    icon: search
    fields:
      meta_title:
        label: Meta Title
        type: text
      meta_description:
        label: Meta Description
        type: textarea
        size: small
