title: Come Lavoro

tabs:
  hero:
    label: Hero
    icon: image
    fields:
      hero_title:
        label: Titolo Hero
        type: text
        required: true
        default: Come Lavoro
      hero_subtitle:
        label: Sottotitolo Hero
        type: textarea
        size: small
      hero_image_url:
        label: URL Immagine Hero
        type: url
        help: "URL Unsplash dell'immagine hero (es. https://images.unsplash.com/...?w=1920&q=80)"

  contenuto:
    label: Contenuto
    icon: text
    fields:
      intro_body:
        label: Introduzione Metodologia
        type: textarea
        help: Testo introduttivo sul metodo di lavoro (supporta Markdown)
      process_image_url:
        label: URL Immagine Processo
        type: url
        help: "Immagine verticale accanto alla timeline (es. https://images.unsplash.com/...?w=800&q=80)"
      process_steps:
        label: Fasi del Processo
        type: structure
        help: "Le fasi del processo legale (4-5 consigliate)"
        fields:
          step:
            label: Numero
            type: text
            width: 1/6
            placeholder: "01"
          title:
            label: Titolo
            type: text
            width: 2/6
            required: true
          description:
            label: Descrizione
            type: textarea
            size: small
            width: 3/6
      cta_title:
        label: Titolo CTA
        type: text
        placeholder: Pronto a Iniziare?
      cta_description:
        label: Descrizione CTA
        type: textarea
        size: small
      cta_button_text:
        label: Testo Pulsante
        type: text
        placeholder: Contattaci
      cta_button_url:
        label: URL Pulsante
        type: text
        help: "Slug della pagina (es. contatti)"

  seo:
    label: SEO
    icon: search
    fields:
      meta_title:
        label: Meta Title
        type: text
      meta_description:
        label: Meta Description
        type: textarea
        size: small
